					</label>
	<!--

					</label>
					
					<label class="item item-input item-floating-label">

					<label class="item item-input item-floating-label">
						<span class="input-label required" translate="FIRSTNAME"></span>
						<input type="text" placeholder="{{'FIRSTNAME' | translate}}*" name="firstname" ng-model="firstname"
						pattern="^[A-Za-z]+$" ng-pattern-restrict required />
						<span class="errorMessage" ng-show="contact.firstname.$error.pattern"
							translate="VALIDFIRSTNAME"></span>
					</label>
					<label class="item item-input item-floating-label">
						<span class="input-label required" translate="LASTNAME"></span>
						<input type="text" placeholder="{{'LASTNAME' | translate}}*" name="lastname" ng-model="lastname"
						pattern="^[A-Za-z]+$" ng-pattern-restrict required />
						<span class="errorMessage" ng-show="contact.lastname.$error.pattern"
							translate="VALIDLASTNAME"></span>
					</label>
					<label class="item item-input item-floating-label">
						<span class="input-label required" translate="EMAILID"></span>
						<input type="text" placeholder="{{'EMAILID' | translate}}*" name="EmailD" ng-model="EmailID"
							ng-trim="false" pattern="^[a-zA-Z0-9+_.-]+@[a-zA-Z0-9.-]+$" ng-pattern-restrict required />
						<span class="errorMessage" ng-show="contact.EmailD.$error.pattern" translate="VALIDEMAIL"></span>
					</label>
					
					<div class = "textarea-border item">
						<span class="input-label required " translate="DESCRIPTIONOFQUERY"></span>
						<textarea class = "textareabg" rows="5"  type="text" maxlength="1000"
							name="desc" ng-model="desc" pattern="^[A-Za-z0-9 ]+$" rows="5" ng-pattern-restrict placeholder="{{'DESCRIPTIONOFQUERRY' | translate}}" required ></textarea>
						<span class="errorMessage" ng-show="lodgeComplaintForm.desc.$error.pattern"
							translate="VALIDDESC"></span>
						<span class="errorMessage" ng-show="lodgeComplaintForm.desc.$error.max"
							translate="VALIDDESC"></span>
							<span class="errorMessage" ng-show="contact.desc.$error.pattern"
							translate="VALIDDESC"></span>
					</div>
					<hr>
					
					  <div ng-if="desc.length>0" class="limit-count {{desc.length>1000?'error':''}}">
