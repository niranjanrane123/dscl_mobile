<ion-view >
	<!-- title="{{'ECHATTISGARH' | translate}}" -->
	<ion-nav-bar class="bar-dark" align-title="center">
		<ion-nav-back-button class="button-clear">
		  <button class="icon ion-chevron-left" ng-click="myGoBack()" ng-controller="TodoCtrl"  style="background: transparent;border: none;"></button>
		  <img style="right: 46%;
		  position: absolute;
		  margin-top: 1px;" src="./img/doon1-3d-test_13-10-2021.png" width=38px; height=35px;>
		</ion-nav-back-button>
	  </ion-nav-bar>
<ion-content ng-controller="UploadDocCTRL" class="animated zoomIn">
<h3 class="heading" translate="UPLOADATT">DES </h3>
<form name="uploadattachdiv" novalidate>
	<div class="list ">

			<table class="gridtable" ng-repeat = "subject in docsitems">
				<tr>
					<th translate="SRNO"></th>
					<!-- <td>{{ subject.docSerialNo }}</td> -->
					<td>{{$index + 1}}</td>
				</tr>
				<tr>
					<th translate="DESCRIPTION"></th>
					<td>{{ subject.docDesceng }}</td>
				</tr>
				<tr>
					<th translate="MANDATORY"></th>
					<td>{{ subject.docMandatory }}</td>
				</tr>
				<tr>
					<th translate="UPLOAD"></th>
					<td><input type="file" class="filecss " id="{{ subject.docID }}"
					ng-model="COUdocupload" onchange="angular.element(this).scope().imageupload(this)"/></td>
				</tr>
			</table>

		<div class="padding">
		 <button ng-click="uploadattch()" class="button button-block  customBgColor">
		 <span translate="UPLOAD"></span></button>
 		</div>
	</div>
</form>

    </ion-content>
</ion-view>
