<ion-view class="titlecss" >
  <!-- title="{{'ECHATTISGARH' | translate}}" -->
  <ion-nav-bar class="bar-dark" align-title="center">
		<ion-nav-back-button class="button-clear">
		  <button class="icon ion-chevron-left" ng-click="myGoBack()" ng-controller="TodoCtrl"  style="background: transparent;border: none;"></button>
		  <img style="right: 46%;
		  position: absolute;
		  margin-top: 1px;" src="./img/doon1-3d-test_13-10-2021.png" width=38px; height=35px;>
		</ion-nav-back-button>
	  </ion-nav-bar>
  <ion-content ng-controller="reopenCtrl" class="HomeBackground">

    <form name="reopenForm">
      <div id="existingcomplaint padding">
        <div class="list col" style="width:100%;">
          <div>
            Please Select Complaint Name
          </div>
          <select id="crimeType" class="item item-input item-select col text-center login crimtype"
            ng-model="complaintReferenceCategory" style="width:100%;">
            <option ng-repeat="crime in respcompains" value="{{crime}}">{{crime.complaintName}}</option>
          </select>
        </div>

      </div>
    </form>
    <div class="map_canvas padding" id="map"></div>
    <div class='padding'>
      <label class="item item-input">
        <textarea placeholder="{{ 'DESCRIPTION' | translate}}" ng-model="description"></textarea>
      </label>
    </div>

    <div class="padding">
      <button type="button" class="button button-positive customBgColor" ng-model="takephoto" ng-click="getPhoto()"><i
          class="icon ion-ios-camera-outline fonth3"></i>
        Take Photo</button>
    </div>

    <div class="row padding" ng-show="img1!=''">
      <div class="column padding">
        <img ng-src="{{ img1 }}" style="width:100%" id="img1" ng-hide="takephotoshow">
      </div>
      <div class="column padding">
        <img ng-src="{{ img2 }}" style="width:100%" id="img2" ng-hide="takephotoshow">
      </div>
      <div class="column padding">
        <img ng-src="{{ img3 }}" style="width:100%" id="img3" ng-hide="takephotoshow">
      </div>
    </div>
    <div class="padding">
      <button type="button" class="button button-positive customBgColor" ng-disabled="description==null"
        ng-click="submit(complaintReferenceCategory,description)"><i class="icon ion-ios-camera-outline fonth3"></i>
        SUBMIT</button>
    </div>
  </ion-content>
</ion-view>

<style>
  .dividerbar {
    font-family: 'Open Sans';
    font-weight: 600;
    background-color: #FEA611;
    color: #fff;
  }

  .textcolor {
    font-family: 'Open Sans';
    font-weight: 600;
  }

  .map_canvas {
    width: 100%;
    height: 200px;
    align: center;
  }

  .column {
    float: left;
    width: 33.33%;
    padding: 5px;
  }

  /* Clearfix (clear floats) */
  .row::after {
    content: "";
    clear: both;
    display: table;
  }
</style>
