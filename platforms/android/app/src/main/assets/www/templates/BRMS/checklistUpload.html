<ion-content ng-controller="ChecklistUploadCTRL" class="HomeBackground">

<!--<h3 class="heading" translate="UPLOADATT"></h3>-->
<form name="uploadattachdiv">
  <div class="headingDiv">
    <h3 class="heading"><img src="./img/quick-services-32x32.png" width="32" height="32">Upload Attachments</h3>
  </div>
		<div class="list">
		    <!--  <div id="UsageDocData"></div> -->
	   <table class="gridtable" ng-repeat = "subject in docsitems">
				<tr>
					<th>Sr.No</th>
					<td>{{$index + 1}}</td>
				</tr>
				<tr>
					<th>Description</th>
					<td>{{ subject.docDesceng }}</td>
				</tr>
				<tr>
					<th>Mandatory</th>
					<td>{{ subject.docMandatory }}</td>
				</tr>
				<tr>
					<th>Upload</th>
					<td><input data-max-size="5000000" type="file" class="filecss " id="{{ subject.docID }}"
					 onchange="angular.element(this).scope().imageupload(this)"/></td>
				</tr>
     </table>

	     <div class="padding">
				<button  ng-click="uploaddocuments()"  class="button button-block  customBgColor">
				<span translate="UPLOAD"></span></button>
		</div>
	</div>
</form>



</ion-content>

</ion-view>
