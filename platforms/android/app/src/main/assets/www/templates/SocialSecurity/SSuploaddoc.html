<ion-content ng-controller="SSdocUploadCTRL" class="HomeBackground">
<!--<h3 class="heading" translate="UPLOADATT"></h3>-->

<form name="uploadattachdiv">
  <div class="headingDiv">
    <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="UPLOADATT"><img src="./img/quick-services-32x32.png" width="32" height="32"></h3>
  </div>
	<div class="list ">
			<!-- <div id="OwnerDocData"></div> -->
			<table class="gridtable" ng-repeat = "subject in docsitems">
				<tr>
					<th>Sr.No</th>
					<!-- <td>{{ subject.docSerialNo }}</td> -->
					<td>{{$index + 1}}</td>
				</tr>
				<tr>
					<th>Description</th>
					<td>{{ subject.docDesceng }}</td>
				</tr>
				<tr>
					<th>Mandatory</th>
					<td>{{ subject.docMandatory }}</td>
				</tr>
				<tr>
					<th>Upload</th>
					<td><input type="file" class="filecss " id="{{subject.docID}}"
					ng-model="COUdocupload" onchange="angular.element(this).scope().imageupload(this)"/></td>
				</tr>
			</table>

	 <div class="padding">
		<button on-tap="uploaddocuments()" class="button button-block  customBgColor">
		<span translate="UPLOAD"></span></button>
	</div>
	</div>
</form>


    </ion-content>
</ion-view>
