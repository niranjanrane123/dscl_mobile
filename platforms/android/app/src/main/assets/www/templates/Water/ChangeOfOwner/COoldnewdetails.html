<ion-content ng-controller="COoldNewDetailCTRL" class="HomeBackground">

<form name="COoldNewDetails">
  <div class="headingDiv">
    <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="OLDDETCO"><img src="./img/quick-services-32x32.png" width="32" height="32"></h3>
  </div>
	 <!--<h3 class="heading" translate="OLDDETCO"></h3>-->
  		<div class="list">
  			<label class="item item-input item-floating-label">
				<span class="input-label" translate="CONSNAME"></span>
				<input type="text" placeholder="{{'CONSNAME' | translate}}" name="oldCOWconnName" ng-model="oldCOWconnName" ng-trim="false"  disabled/>
				<span class="errorMessage" ng-show="COoldNewDetails.oldCOWconnName.$error.pattern" translate="PLEASEENTERVALIDCONNECTION"></span>
			</label>
			<label class="item item-input item-floating-label">
				<span class="input-label" translate="ADHARNO"></span>
				<input type="number" placeholder="{{'ADHARNO' | translate}}" name="oldCOWadharName" ng-model="oldCOWadharName" ng-trim="false" ng-pattern="/^[0-9]{1,18}$/" disabled/>
				<span class="errorMessage" ng-show="COoldNewDetails.oldCOWadharName.$error.pattern" translate="VALIDAADHAR"></span>
			</label>
			<label class="input-label padding-left-15" translate="SELECT_TARIF"> </label>
				<select class="select-dropdown" name="oldCOUtarifCate" ng-model="oldCOUtarifCate"
					ng-options="o.trfid as o.trfname for o in trfoptions" id="oldtarifcos" disabled>
					<option value="" translate="SELECTTARIF"></option>
				</select><label class="item item-input item-floating-label"></label>
<!--			<label class="input-label padding-left-15" translate="SELECT_PERMISE"> </label>-->
<!--				<select class="select-dropdown" name="oldCOUpermiseType" ng-model="oldCOUpermiseType"-->
<!--					ng-options="o.permiseid as o.permisename for o in permiseoptions" id="oldpermisecos" disabled>-->
<!--					<option value="" translate="SELECTPERMISE"></option>-->
<!--				</select><label class="item item-input item-floating-label"></label>-->
  			<label class="input-label padding-left-15" translate="SELECT_CONSIZE"></label>
				<select class="select-dropdown disabled-class" name="oldCOUconnSize" ng-model="oldCOUconnSize"
					ng-options="o.cszid as o.cszname for o in cszoptions" id="oldconnsize" disabled>
					<option value="" translate="SELECTSIZE"></option>
				</select><label class="item item-input item-floating-label"></label>

	<!-- <h4 class="heading" translate="NEWDETCO"></h4><div class="spacer" style="height: 7px;"></div>-->
        <div class="headingDiv">
          <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="NEWDETCO"><img src="./img/quick-services-32x32.png" width="32" height="32"></h3>
        </div>
			<label class="input-label padding-left-15 required" translate="SELECT_TRANSFER"></label>
				<select class="select-dropdown" name="newtransfermode" ng-model="newtransfermode"
					ng-options="o.tfmname for o in tfmoptions" id="TFMname"  required>
					<option value="" translate="SELECT">Select</option>
				</select><label class="item item-input item-floating-label"></label>
  			<label class="input-label padding-left-15 required" translate="SEL_TITLE"></label>
				<select class="select-dropdown" name="WNCselecttitle" ng-model="WNCselecttitle"
					    ng-options="o.ttlid as o.ttlname for o in ttloptions" required>
          <option value="" translate="SELECT">Select</option>
				</select><label class="item item-input item-floating-label"></label>
			<label class="item item-input item-floating-label">
				<span class="input-label required " translate="FNAME"> </span>
				<input type="text" placeholder="{{'FNAME' | translate}}*" name="WNCFirstname" ng-model="WNCFirstname" required/>
				<span class="errorMessage" ng-show="COoldNewDetails.WNCFirstname.$error.pattern" translate="VALIDFIRSTNAME"></span>
			</label>
			<label class="item item-input item-floating-label">
				<span class="input-label " translate="MNAME"> </span>
				<input type="text" placeholder="{{'MNAME' | translate}}" name="WNCMiddlename" ng-model="WNCMiddlename" />
				<span class="errorMessage" ng-show="COoldNewDetails.WNCMiddlename.$error.pattern" translate="VALIDMIDDLENAME"></span>
			</label>
			<label class="item item-input item-floating-label">
				<span class="input-label required" translate="LNAME"></span>
				<input type="text" placeholder="{{'LNAME' | translate}}*" name="WNCLastname" ng-model="WNCLastname" required/>
				<span class="errorMessage" ng-show="COoldNewDetails.WNCLastname.$error.pattern" translate="VALIDLASTNAME"></span>
			</label>
			<label class="input-label padding-left-15 required" translate="GENDER">Gender</label>
				<select class="select-dropdown" name="WNCgender" ng-model="WNCgender"
					ng-options="o.genid as o.genname for o in genoptions"  required>
          <option value="" translate="SELECT">Select</option>
				</select><label class="item item-input item-floating-label"></label>
			<label class="item item-input item-floating-label">
				<span class="input-label required" translate="ADHARNO"></span>
				<input type="number" placeholder="{{'ADHARNO' | translate}}" name="WNCaadharnumber" ng-model="WNCaadharnumber"
				 ng-trim="false" ng-pattern="/^[0-9]{12,12}$/" />
				<span class="errorMessage" ng-show="COoldNewDetails.WNCaadharnumber.$error.pattern" translate="VALIDAADHAR"></span>
			</label>
			<label class="item item-input item-floating-label">
				<span class="input-label" translate="REMARKS"></span>
				<input type="text" placeholder="{{'REMARKS' | translate}}" name="COURemarks" ng-model="COURemarks"  />
				<span class="errorMessage" ng-show="COoldNewDetails.COURemarks.$error.pattern" translate="VALIDREMARKS"></span>
			</label>
			<label class="input-label padding-left-15 required" translate="SEL_BPL"></label>
					<select class="select-dropdown" name="WNCBpl" ng-model="COBpl"
                  ng-options="obj.value as obj.label for obj in bpldata" required>
            <option value="" translate="SELECT">Select</option>
				</select>

				<div id="isbpl" ng-if="COBpl == 'Y'">
					<label class="item item-input item-floating-label">
						<span class="input-label required" translate="BPLNO"></span>
						<input type="number" placeholder="{{'BPLNO' | translate}}*" name="CObplno" ng-model="CObplno" ng-trim="false" ng-pattern="/^[0-9]{6,6}$/" required/>
						<span class="errorMessage" ng-show="COoldNewDetails.CObplno.$error.pattern" translate="VALIDBPL"></span>
					</label>
				 </div>

		 	 <ion-checkbox name="cb" ng-model="addinfochecked" ng-change="openModal('new','','','','','','')" >
			<span class="input-label" translate="ADDOWNER"></span></ion-checkbox>

		<ion-list can-swipe="true" class="list-categories">
			<ion-item ng-repeat="item in receiptCollections | filter:search track by $index"  class="">

				<table class="gridtable">
					<tr>
            <th translate="TITLE"></th>
						<td>{{item.ownerTitle}}</td>
					</tr>
					<tr>
            <th translate="FIRSTNAME"></th>
						<td>{{item.ownerFirstName}}</td>
					</tr>
					<tr>
            <th translate="MIDDLENAME"></th>
						<td>{{item.ownerMiddleName}}</td>
					</tr>
					<tr>
            <th translate="LASTNAME"></th>
						<td>{{item.ownerLastName}}</td>
					</tr>
					<tr>
            <th translate="GENDER"></th>
						<td>{{item.gender_name}}</td>
					</tr>
					<!-- <tr>
						<th>Gender</th>
						<td>{{item.gender}}</td>
					</tr> -->
				</table>
				 <button class="remove" ng-click="removeReceiptHead($index)">-</button>

				<!-- <button style="font-size: 24px; " class="button-assertive button ion-ios-trash rightcss"
				 ng-click="removeReceiptHead($index)"> -->
			  </button>
		 </ion-item>
	</ion-list>

        <div class="padding ">
			<!--	<div class="col col-50">-->

				  <!-- <button  ng-model="addinfochecked" ng-click="openModal('new','','','','','','')" class="button twoButtons button-block  customBgColor">
				    <span class="input-label" translate="">Add Additional Owner</span></button>-->

		        <button  ng-disabled="!COoldNewDetails.$valid" ng-click="confrmproceed()" class="button button-block  customBgColor">
		        <span translate="PROCEED"></span></button>
<!--
		        </div>-->
		    </div>
	</div>

</form>

    </ion-content>
</ion-view>

    background: #C76868;

    display: inline-block;
    padding: 4px 9px;
    vertical-align: top;
    line-height: 100%;
}
