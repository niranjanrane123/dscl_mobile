<ion-view class="" title="e-Chhattisgarh">
	<ion-content scroll="true" class="HomeBackground">
		<form name="estateBookPropForm" ng-submit="submitPropertyInfo()">
       <div class="headingDiv">
        <h3 class="heading"><img src="./img/quick-services-32x32.png" width="32" height="32">Booking Details</h3>
       </div>
				 <div class="padding-left-15 customBgColor">All fields marked asterisk(<span class="required"></span>) are mandatory</div>

					<div class="list">
						<label class="item item-input item-floating-label">
							<span class="input-label required" translate="FRDATE"></span>
							<input type="text" placeholder="{{'FRDATE'|translate}}*" min="{{minDate | date: 'yyyy-MM-dd'}}" onfocus="(this.type='date')" ng-blur="changeDateAttr($event,data.fromDate,'From Date(DD/MM/YYYY)*')" id="fromDate" name="fromDate" ng-model="data.fromDate" ng-trim="false" ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" class="datepicker" ng-change="getShifts('from')" required  />
							<span class="errorMessage" ng-show="estateBookPropForm.fromDate.$error.pattern">Please Enter Valid Date</span>
						</label>

						<label class="item item-input item-floating-label">
							<span class="input-label required" translate="TODATEFORMATE"></span>
              <input type="text" placeholder="{{'TODATEFORMATE'|translate}}*" min="{{data.fromDate | date: 'yyyy-MM-dd'}}"  onfocus="(this.type='date')" ng-blur="changeDateAttr($event,data.fromDate,'From Date(DD/MM/YYYY)*')" id="toDate" name="toDate" ng-model="data.toDate" ng-trim="false" ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" class="datepicker" ng-change="getShifts('to')" required  />
              <span class="errorMessage" ng-show="estateBookPropForm.fromDate.$error.pattern">Please Enter Valid Date</span>
						</label>

						<label class="input-label padding-left-15 required" translate="SHIFT"></label>
              <select class="select-dropdown" name="RNLShift" ng-model="data.RNLShift" ng-change="getCheckInOut()"
                ng-options="o.propShift as o.propShiftDesc for o in shiftList" required>
              <option value="">Select</option>
            </select>

            <label class="input-label padding-left-15 required" translate="EVENT"></label>
              <select class="select-dropdown" name="RNLEvent" ng-model="data.RNLEvent"
                ng-options="o.propEvent as o.propEventDesc for o in eventList" required>
                <option value="">Select</option>
              </select>

						<label class="item item-input item-floating-label">
							<span class="input-label" translate="CHECKIN"></span>
							<input type="text" placeholder="Check In" name="checkIn" ng-model="data.checkIn" >
						</label>

            <label class="item item-input item-floating-label">
              <span class="input-label" translate="CHECKOUT"></span>
              <input type="text" placeholder="Check Out" name="checkOut" ng-model="data.checkOut" >
            </label>

            <label class="item item-input item-floating-label">
              <span class="input-label"></span>
              <input type="number" placeholder="No. of Invitees" name="noOfInvities" ng-model="data.noOfInvities" >
            </label>

              <div class="table-container" ng-if="data.noOfInvities>=100">
                <div class="table-item">
                  <ion-checkbox style="border-color: transparent;" name="cb" ng-model="data.checkBox"  required>
                  </ion-checkbox>
                </div>
                <div class="table-item first">
                  <a ng-click="openLink()"  class="conditionterm"><div style="color: #000">I agree</div>Plastic Usage Terms&Conditions*</a>
                </div>
              </div>
            </div>

						<div class="padding">
							<button ng-disabled="estateBookPropForm.$invalid" class="button button-block  customBgColor">
								<span translate="SUBMIT"></span>
							</button>
						</div>
					</div>
		</form>
  </ion-content>
</ion-view>
<style>
.slider{
	height: 477px;
}
.table-container {
	display: table;
}
.table-item {
	 color: #fff;
   display: table-cell;
   padding-top: 10px;
   vertical-align: middle;
}

.table-item.first {
    font-size: 15px;
    text-align: left;
}
.conditionterm {
  color : #387ef5!important
}
</style>
