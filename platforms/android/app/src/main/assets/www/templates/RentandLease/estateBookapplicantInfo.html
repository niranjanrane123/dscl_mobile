<ion-view class="" title="e-Chhattisgarh">

	<ion-content scroll="true" class="HomeBackground">

		<form name="estateBookPropForm" ng-submit="appInfonext()">
      <div class="headingDiv">
        <h3 class="heading">Applicant Information</h3>
      </div>
				  <div class="padding-left-15 customBgColor">All fields marked asterisk(<span class="required"></span>) are mandatory</div>
					<div class="list">
						<label class="input-label padding-left-15 required" translate="SEL_TITLE"></label>
						<select class="select-dropdown" name="RNLTitle" ng-model="data.RNLTitle" ng-options="o.value as o.name for o in ttlList" required>
							<option value="">Select</option>
						</select>
						<label class="item item-input item-floating-label">
							<span class="input-label required">First Name</span>
							<input type="text" placeholder="First Name*" name="RNLFName" ng-model="data.RNLFName"  required/>
							<span class="errorMessage" ng-show="estateBookPropForm.RNLFName.$error.pattern">Please Enter Valid First Number</span>
						</label>
						<label class="item item-input item-floating-label">
							<span class="input-label">Middle Name</span>
							<input type="text" placeholder="Middle Name" name="RNLMName" ng-model="data.RNLMName" />
							<span class="errorMessage" ng-show="estateBookPropForm.RNLMName.$error.pattern">Please Enter Valid Middle Number</span>
						</label>
						<label class="item item-input item-floating-label">
							<span class="input-label required">Last Name</span>
							<input type="text" placeholder="Last Name*" name="RNLLName" ng-model="data.RNLLName" required/>
							<span class="errorMessage" ng-show="estateBookPropForm.RNLLName.$error.pattern">Please Enter Valid Last Number</span>
						</label>
					    <label class="input-label padding-left-15 required" translate="SELECT_GEN"></label>
						<select class="select-dropdown" name="RNLgender" ng-model="data.RNLGender" id="RNLgender" ng-options="o.value as o.name for o in genList" required>
							<option value="">Select</option>
						</select>
						<label class="item item-input item-floating-label">
							<span class="input-label required">Mobile Number</span>
							<input type="tel" placeholder="Mobile Number*" name="RNLMobile" ng-model="data.RNLMobile" ng-trim="false" ng-pattern="/^[0-9]{10,10}$/" required/>
							<span class="errorMessage" ng-show="estateBookPropForm.RNLMobile.$error.pattern">Please Enter Valid Mobile Number</span>
						</label>
						<label class="item item-input item-floating-label">
							<span class="input-label">Email ID</span>
							<input type="email" placeholder="Email ID" name="RNLEmail" ng-model="data.RNLEmail" ng-trim="false" ng-pattern="/^([A-Za-z0-9_\-\.])+\@([A-Za-z0-9_\-\.])+\.([A-Za-z]{2,4})$/"/>
							<span class="errorMessage" ng-show="estateBookPropForm.RNLEmail.$error.pattern">Please Enter Valid Email ID</span>
						</label>
					  <label class="item item-input item-floating-label">
							<span class="input-label">Aadhar Number</span>
							<input type="tel" placeholder="Aadhar Number" name="RNLAadhar" ng-model="data.RNLAadhar" ng-trim="false" ng-pattern="/^[0-9]{12,12}$/"/>
							<span class="errorMessage" ng-show="estateBookPropForm.RNLAadhar.$error.pattern">Please Enter Valid Aadhar Number</span>
						</label>
						<label class="item item-input item-floating-label">
							<span class="input-label">Pan Number</span>
							<input type="text" placeholder="Pan Number" name="RNLPan" ng-model="data.RNLPan" ng-trim="false" ng-pattern="/^([a-zA-Z]){5}([0-9]){4}([a-zA-Z]){1}?$/"/>
							<span class="errorMessage" ng-show="estateBookPropForm.RNLPan.$error.pattern">Please Enter Valid Pan Number</span>
						</label>

					<!-- Address Details Start-->
            <label class="item item-input item-floating-label">
              <span class="input-label ">Flat No. / Building No.</span>
              <input type="text" placeholder="Flat No. / Building No." name="RNLFlatNo" ng-model="data.RNLFlatNo" />
              <span class="errorMessage" ng-show="estateBookPropForm.RNLFlatNo.$error.pattern" translate="VALIDFLATBUILDINGNUMBER"></span>
            </label>
            <label class="item item-input item-floating-label">
              <span class="input-label ">Building Name</span>
              <input type="text" placeholder="Building Name" name="RNLBuilding" ng-model="data.RNLBuilding"/>
              <span class="errorMessage" ng-show="estateBookPropForm.RNLBuilding.$error.pattern" translate="VALIDBUILDINGNAME"></span>
            </label>
            <label class="item item-input item-floating-label">
              <span class="input-label ">Road Name</span>
              <input type="text" placeholder="Road Name" name="RNLRoad" ng-model="data.RNLRoad" />
              <span class="errorMessage" ng-show="estateBookPropForm.RNLRoad.$error.pattern" translate="VALIDROADNAME"></span>
            </label>
            <label class="item item-input item-floating-label">
              <span class="input-label ">Block Name</span>
              <input type="text" placeholder="Block Name" name="RNLBlock" ng-model="data.RNLBlock" />
              <span class="errorMessage" ng-show="estateBookPropForm.RNLBlock.$error.pattern" translate="VALIDBLOCKNAME"></span>
            </label>
            <label class="item item-input item-floating-label">
              <span class="input-label required">Area Name</span>
              <input type="text" placeholder="Area Name*" name="RNLArea" ng-model="data.RNLArea" required/>
              <span class="errorMessage" ng-show="estateBookPropForm.RNLArea.$error.pattern" translate="VALIDAREANAME"></span>
            </label>
            <label class="item item-input item-floating-label">
              <span class="input-label required">Village/Town/City</span>
              <input type="text" placeholder="Village/Town/City*" name="RNLVillage" ng-model="data.RNLVillage" required/>
              <span class="errorMessage" ng-show="estateBookPropForm.RNLVillage.$error.pattern" translate="VALIDVILLAGETOWN"></span>
            </label>
            <label class="item item-input item-floating-label">
              <span class="input-label required">Pin Code</span>
              <input type="tel" placeholder="Pin Code*" name="RNLPinCode" ng-model="data.RNLPinCode" ng-trim="false" ng-pattern="/^[1-9]\d{5,5}$/" required>
              <span class="errorMessage" ng-show="estateBookPropForm.RNLPinCode.$error.pattern" translate="VALIDPINCODE"></span>
            </label>

            <label class="input-label padding-left-15" ng-if="isBPL" translate="ISBELOWPOVERTYLINE"></label>
            <select ng-if="isBPL" class="select-dropdown" name="povertyLevel" data-ng-model="data.povertyLineValue" id="povertyLine"
                    ng-options="o.value as o.name for o in povertyLine">
              <option value="" translate="SELECT"></option>
            </select>

            <label class="item item-input item-floating-label" ng-if="data.povertyLineValue == 'Y'">
              <span class="input-label required" translate="BPLNO"></span>
              <input type="number" placeholder="{{'BPLNO' | translate}}*" name="bplNo" ng-model="data.bplNo" ng-pattern="/^[0-9]{6,6}$/"  ng-trim="false" required/>
              <span class="errorMessage" ng-show="rtiApplicantForm.bplNo.$error.pattern" translate="VALIDBPL"></span>
            </label>

			<label class="input-label padding-left-15" ng-if="isEMP" translate="ISORGANISATIONEMPLOY"></label>
			<select ng-if="isEMP" class="select-dropdown" name="isemployee" data-ng-model="data.isEmploy" id="isemp"
					ng-options="o.value as o.name for o in isOrganizationEmploy" >
				<option value="" translate="SELECT"></option>
			</select>

<!--            <label class="input-label padding-left-15 required" ng-if="isEMP" translate="ISORGANISATIONEMPLOY"></label>-->
<!--            <select ng-if="!organisation" class="select-dropdown" name="isEmploy" data-ng-model="data.isEmploy" id="isEmploy"-->
<!--                    ng-options="o.value as o.name for o in isOrganizationEmploy"  required>-->
<!--              <option value="" translate="SELECT"></option>-->
<!--            </select>-->
						<!-- Address Details End -->
						</div>
						<div class="padding">
							<button ng-disabled="estateBookPropForm.$invalid" class="button button-block  customBgColor">
								<span translate="">NEXT</span>
							</button>
						</div>
		</form>
    </ion-content>
</ion-view>
<style>
.slider{
	height: 477px;
}
</style>
