<ion-view title="e-Chhattisgarh">
  <ion-nav-bar class="bar-dark" align-title="center"><ion-nav-back-button></ion-nav-back-button></ion-nav-bar>
 <ion-content ng-controller="ComplaintTaskCtrl" class="HomeBackground" >
    <form name="complresolutiondashboard">
      <div class="headingDiv">
        <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="">Complaint Resolution</h3>
      </div>

      <div class="list">
        <span class="item item-input" style="padding: 0 0 0 16px;">
         <input type="tel" ng-model="search" class="" placeholder="{{ 'SEARCHAPPLNO' | translate}}">
        </span>
      </div>

      <div class="card list" ng-show="show==1" ng-click="setSelected(subject.referenceId)"
         ng-repeat = "subject in empTaskData | filter: {referenceId: search}">
         <div class="item item-divider dividerbar">
          <p style="color:#fff;">{{ 'APPLICATIONNO' | translate}}: {{subject.referenceId}}</p>
         </div>
        <div class="item item-text-wrap textcolor">
          <p>{{ 'DEPARTMENT' | translate}}: {{ subject.deptName }}</p>
          <p>{{ 'SERVICENAME' | translate}}: {{ subject.serviceName }}</p>
          <p>{{ 'STATUS' | translate}}: {{ subject.taskStatus }}</p>
        </div>
      </div>

    </form>
 </ion-content>
</ion-view>

<style>
.dividerbar
  {
    font-family:'Open Sans';
    font-weight:600;
    background-color:#158b42;
    color:#fff;
   }
  .textcolor{
    font-family:'Open Sans';
    font-weight:600;
  }
</style>
