<ion-view >
  <!-- title="{{'ECHATTISGARH' | translate}}" -->
  <ion-nav-bar class="bar-dark" align-title="center">
		<ion-nav-back-button class="button-clear">
		  <button class="icon ion-chevron-left" ng-click="myGoBack()" ng-controller="TodoCtrl"  style="background: transparent;border: none;"></button>
		  <img style="right: 46%;
		  position: absolute;
		  margin-top: 1px;" src="./img/doon1-3d-test_13-10-2021.png" width=38px; height=35px;>
		</ion-nav-back-button>
		</ion-nav-bar>
<ion-content ng-controller="propertypaymentCtrl" class= HomeBackground" >
  <form name="propertyPayment">
	 <div class="list">
     <div class="headingDiv">
       <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="PAYMENT"></h3>
     </div>
    <label class="item item-input item-floating-label">
      <span class="input-label required" translate="TOTAL_AMOUNT"> </span>
      <input type="text" placeholder="{{'TOTAL_AMOUNT' | translate}}" name="totalPayableAmount" ng-model="totalPayableAmount"
        ng-trim="false" ng-pattern="/^[0-9]{1,50}$/" disabled/>
    </label>

     <label class="item item-input item-floating-label">
       <span class="input-label required" translate="APPL_NAME"></span>
       <input type="text" placeholder="{{'APPL_NAME' | translate}}" name="finalAppName" ng-model="applicantName"
            disabled />
     </label>
     <label class="item item-input item-floating-label">
       <span class="input-label required" translate="MOBILENO"></span>
       <input type="tel" placeholder="{{'MOBILENO' | translate}}" name="finalAppMobile" ng-model="mobileNo"
        ng-pattern="/^[0-9]{10,10}$/"  disabled/>
     </label>

    <label class="item item-input item-floating-label">
      <span class="input-label required" translate="ENTAMT"></span>
      <input type="number" placeholder="{{'ENTAMT' | translate}}*" name="payingAmount" ng-model="payingAmount"
        ng-trim="false" ng-pattern="/^[0-9]{1,10}$/" required/>
      <span class="errorMessage" ng-show="propertyPayment.payingAmount.$error.pattern" translate="ENTERPAYBLE"></span>
    </label>

    <label class="input-label padding-left-15 required" translate="PAYGATEWAY"></label>
    <select class="select-dropdown" name="paymentGateway" data-ng-model="paymentGateway"
       ng-options="o.id as o.name for o in options" required>
      <option value="">Select</option>
    </select>

     <div class="padding">
       <button ng-disabled="!propertyPayment.$valid" class="button button-block  customBgColor"
          ng-click="propertypaybill()">
         <span translate="PROCEED_TO_PAY"></span></button>
     </div>
  </div>
</form>
    </ion-content>
</ion-view>
