<ion-view>
  <ion-side-menus>

    <ion-side-menu-content>

      <ion-nav-bar class="bar-dark" align-title="center">
        <ion-nav-back-button></ion-nav-back-button>
      </ion-nav-bar>
      <ion-nav-view name="menuContent"></ion-nav-view>
    </ion-side-menu-content>

    <ion-side-menu side="left" class="left-menu">
      <ion-content class="bgblueColor" ng-controller="MenuCtrl"><!-- class="HomeBackground" -->
        <div ng-switch on="selection" class="slide-right-left" ng-class="{reverse: submenu}">
          <div class="list menu-sidebar" ng-if="!data.currentUser.user" ng-switch-default>

          
         

            <a class="item  anchor">
              <span class="labelcss colorWhite" translate="CHANGE_LANGUAGE"></span>
              <div class="langButton">
                <button  class="langbtn"  id="lang2"  align="center" ng-click="changeLanguage(hiBtn)">{{ 'HI_BTN' | translate}}</button>
                <button  class="langbtn activeLang" id="lang1"  align="center" ng-click="changeLanguage(enBtn)">{{ 'EN_BTN' | translate}}</button>
              </div>
            </a>

            <a class="item  anchor" ng-show="isLoggedIn()"  ui-sref='app.editProfile' menu-close="">
              <span class="labelcss colorWhite fontBold" translate="EDITPROFILE"></span>
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right"></i>
            </a>

            <a class="item  anchor" ui-sref='app.AboutUs' menu-close="">
              <span class="labelcss colorWhite fontBold" translate="ABOUTUS"></span>
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right"></i>
            </a>

            <a class="item  anchor" ui-sref='app.faq' ui-sref-active="active" menu-close="">
              <span class="labelcss colorWhite fontBold" translate="FAQ"></span>
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right"></i>
            </a>

            <a class="item  anchor" ui-sref='app.contactus' ui-sref-active="active" menu-close="">
              <span class="labelcss colorWhite fontBold" translate="CONTACT_US"></span>
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right"></i>
            </a>

            <a class="item  anchor" ui-sref='app.privacyPolicy' ui-sref-active="active" menu-close="">
              <span class="labelcss colorWhite fontBold" translate="PRIVACYPOLICY"></span>
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right"></i>
            </a>                       

            <a class="item  anchor" ui-sref='app.termsandCondition' ui-sref-active="active" menu-close="">
              <span class="labelcss colorWhite fontBold" translate="TERMSCONDITIONS"></span>
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right"></i>
            </a>

            <a class="item  anchor" ng-show="isLoggedIn()" ui-sref='app.feedback' ui-sref-active="active" menu-close="">
              <span class="labelcss colorWhite fontBold" translate="FEEDBACK"></span>
              <!-- <i style="float: right;" class="icon ion-chevron-right" style = "background-color: #444;"></i> -->
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right" id = "iconcolor"></i>
            </a>                                                                
              
            <!-- <a class="item  anchor" ng-show="isLoggedIn()" ng-click="logout()" ui-sref-active="active" menu-close="">
              <span class="labelcss colorWhite" translate="LOG_OUT"></span>
              <!-- <i style="float: right;"class="icon ion-chevron-right" style = "background-color: #444;"></i> --
              <i class="colorWhite" style="float: right;" class="icon ion-chevron-right" id = "iconcolor"></i>
            </a> -->
          </div>
   
          <!-- New Theme Change -->
          <div style="width: 100%;text-align: center;margin-top: 20px;padding-left: 10px;padding-right: 10px;" menu-close="" ng-show="isLoggedIn()" ui-sref-active="active">
            <button class="button circlebtn" style="border-radius:10px; background: #d74701; color: #FFF;border-radius: 50px !important;" ng-click="logout()">
              <!-- <i class="icon ion-power"></i> -->
              <span class="fontBold" translate="LOG_OUT" style="color:#fff"></span>
            </button>
          </div>
          <!-- <a class="item item-icon-left" >
				<i class="icon ion-map"></i>
				<span class="labelcss">{{wardName}}</span>
			</a>
			<a class="item item-icon-left" >
				<i class="icon ion-ios-location-outline"></i>
				<span class="labelcss">{{zoneName}}</span>
			</a> -->
          <!--		</div>-->

        </div>
        <!-- <div class="version-number">v:{{appVersion}}</div> -->
        <div class="version-number fontBold">v:{{appVersion}}</div>
      </ion-content>
    </ion-side-menu>

  </ion-side-menus>
</ion-view>


<style>
  #iconcolor{
    color: #013561 !important;
  }
  .langButton{
    margin: 10px;
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 0px 10px;
    font-family: Open Sans;
    line-height: 20px;
    font-size: 1em;
    position: absolute;
    top: -2px;
    right: 1px;
    z-index: 1;
		}

.langbtn{
		border: none;
		/* background: hsl(51, 100%, 50%) !important; 
    color: #fff; */
    background: #fff !important;
    color:#000 !important;
		font-size: 1.75rem !important;
		font-weight: bold !important;
		padding: 0.2rem 1rem !important;
		height: 3.5rem !important;
		font-style: normal;
		border-radius: 3px;
		}

#lang1{
		margin-left: -4px;	   
		}

.activeLang{
		/* background: #00aa55 !important; */
    background: #000 !important;
    color: #fff !important;
		} 
  a.item.anchor {
    color: #013561 !important;
  }

  .bar.bar-profile {
    background-color: #444;
    height: 170px;
  }

  .bar .profile {
    top: 0;
    right: 0;
    left: 0;
    z-index: 0;
    overflow: hidden;
    text-align: center;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    padding-top: 15px;
  }

  .profile .name {
    color: #FFFFFF;
    margin-top: 10px !important;
    margin-bottom: 10px !important;
  }

  .profile-picture {
    border-radius: 50%;
  }

  .menu .has-header {
    top: 169px;
  }
</style>
