  <ion-view >
    <!-- title="{{'ECHATTISGARH' | translate}}" -->

    <ion-nav-bar class="bar-dark" align-title="center">
      <ion-nav-back-button class="button-clear">
        <button class="icon ion-chevron-left" ng-click="myGoBack()" ng-controller="TodoCtrl"  style="background: transparent;border: none;"></button>

        position: absolute;

   <ion-content ng-controller="rtiInformationCtrl" class="animated zoomIn">
    <form name="rtiInformationForm">
      <div class="list">
        <h3 class="heading" translate="REQUIREDRTIINFO"></h3>
        <div class="rti-steps">3 of 4</div>
        <!--<label class="input-label padding-left-15 required" translate="DEPARTMENT"></label>
        <select class="select-dropdown" name="department" data-ng-model="department"
          ng-options="o.value as o.name for o in departmentList" ng-change="departmentType()" required>
          <option value="" translate="SELECT"></option>
        </select>-->

        <label  class="input-label padding-left-15 required" translate="DEPARTMENT"></label>
      <select   class="select-dropdown" name="department"data-ng-model="department" 
        id="povertyLine"
        ng-options="o.value as o.name for o in departmentList" ng-change="departmentType()" required>
        <option value="" translate="SELECT"></option>
      </select>
      <label  class="item item-input item-floating-label"></label>

        <!--<label class="input-label padding-left-15 required" translate="LOCATION"></label>
        <select class="select-dropdown" name="location" data-ng-model="location"
         ng-options="o.value as o.name for o in departmentLoc"  required>
          <option value="" translate="SELECT"></option>
        </select>-->

        <label  class="input-label padding-left-15 required" translate="LOCATION"></label>
        <select   class="select-dropdown" name="location"data-ng-model="location" 
          id="povertyLine"
          ng-options="o.value as o.name for o in departmentLoc"  required>
          <option value="" translate="SELECT"></option>
        </select>
        <label  class="item item-input item-floating-label"></label>


        <label class="item item-input item-floating-label">
          <span class="input-label required" translate="SUBJECT"></span>
          <input type="text" placeholder="{{'SUBJECT' | translate}}*" maxlength="500" name="subject" ng-model="subject"  required/>
          <span class="errorMessage" ng-show="rtiInformationForm.subject.$error.pattern" translate="VALIDSUBJECT"></span>
        </label>

        <!-- <label class="item item-input item-floating-label">
          <span class="input-label required" translate="TEXTFORRTIAPPLICATION"></span>
          <input type="text"  maxlength="3000" placeholder="{{'TEXTFORRTIAPPLICATION' | translate}}*" name="reqApplication" ng-model="reqApplication"  required/>
        </label> -->

        <label class="item item-input item-floating-label">
          <span class="input-label " translate="TEXTFORRTIAPPLICATION"></span>
          <input type="text" maxlength="500" placeholder="{{'TEXTFORRTIAPPLICATION' | translate}}*"
            name="reqApplication" ng-model="reqApplication" pattern="^[A-Za-z0-9 ]+$" ng-pattern-restrict  required />
          <span class="errorMessage" ng-show="lodgeComplaintForm.reqApplication.$error.pattern"
            translate="VALIDDESC"></span>
          <span class="errorMessage" ng-show="lodgeComplaintForm.reqApplication.$error.max"
            translate="VALIDDESC"></span>
        </label>
        <div ng-if="reqApplication.length>0" class="limit-count {{reqApplication.length>3000?'error':''}}">
          {{reqApplication.length}} / 500</div>
        
          <table class="gridtable">
            <tr>
              <th class="required"  translate="UPLOAD"></th>
              <td>
                <button class="button button-small button-dark" style="width: 100%;" onclick="document.getElementById('plbImg').click()">
                  {{'UPLOADIMAGE'| translate}}
                  </button>
                  <p class="docFileName" >{{ fileName}}</p>
                  <div class="note-for-fileupload">{{'Onlyjpgpngpdfdoc' | translate}}</div>
                <div class="note-for-fileupload">{{'validdocumentSize' | translate}}</div>
                <input style="display:none" 
                    data-max-size="1000000" 
                    type="file" class="filecss "id="plbImg"
                    onchange="angular.element(this).scope().imageupload2(this)" />

                   
              </td>
              <!-- <td><input type="file" class="filecss " id="plbImg"
                         ng-model="plbmg" onchange="angular.element(this).scope().imageupload2(this)"/>
                <div class="note-for-fileupload">{{'Onlyjpgpngpdfdoc' | translate}}</div>
                <div class="note-for-fileupload">{{'validdocumentSize' | translate}}</div></td>
              </td> -->
            </tr>
          </table>
      </div>

      
      <div ng-if="!provertyCheck && oragnisationCheck  && direct">
        <!-- <label class="input-label padding-left-15 required" translate="PAYMENT"></label>
          <select class="select-dropdown" name="paymentGateway" data-ng-model="paymentModeID"
                  ng-options="o.id as o.name for o in bankList"  ng-change="paymentmode(paymentModeID)" required>
            <option value="" translate="SELECT"></option>
          </select><label class="item item-input item-floating-label"></label><br> -->


        <!--FOR Collection Mode Details PAYMENT-->
        <div ng-if="collectionModeDetails">
          <div class="headingDiv">
            <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="">
              <img src="./img/quick-services-32x32.png" width="32" height="32" translate="COLLECTIONMODEDETAILS"></h3>
          </div>
          <label class="input-label padding-left-15 required" translate="DRAWNON"></label>
          <select class="select-dropdown" name="BankName" data-ng-model="data.selectedBankID"
                  ng-options="c.id as c.name for c in chequebankList" required>
            <option value="" translate="SELECT"></option>
          </select><label class="item item-input item-floating-label"></label>
          <label class="item item-input item-floating-label">
            <span class="input-label required" translate="ACCNO"></span>
            <input type="number" placeholder="{{'ACCNO' | translate}}*" name="accountNo" ng-model="data.accountNo"
                   ng-trim="false" ng-pattern="/^[0-9]{11,16}$/" required/>
            <span class="errorMessage" ng-show="propertyPayment.accountNo.$error.pattern" translate="VALIDACCOUNTNO"></span>
          </label>
          <label class="item item-input item-floating-label">
            <span class="input-label required" translate="CHQNO"></span>
            <input type="number" placeholder="{{'CHQNO' | translate}}*" name="chequeNo" ng-model="data.chequeNo"
                   ng-trim="false" ng-pattern="/^[0-9]{6,6}$/" required/>
            <span class="errorMessage" ng-show="propertyPayment.chequeNo.$error.pattern" translate="VALIDNUMBER"></span>
          </label>
          <label class="item item-input item-floating-label">
            <span class="input-label required" translate="DATE"></span>
            <input type="text"  onfocus="(this.type='date')" onblur="(this.type='text')" ng-blur="changeAttr($event)" name="date" ng-model="data.date" ng-trim="false" placeholder="{{'DATE' | translate}}*"
                   ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" required/>
          </label>
        </div>
      </div>


      <div ng-if="provertyCheck && !oragnisationCheck">
        <div class="headingDiv">
          <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="UPLOADATT"><img src="./img/quick-services-32x32.png" width="32" height="32"></h3>
        </div>
        <table class="gridtable" ng-repeat = "subject in docsitems">
          <tr>
            <th translate="SRNO"></th>
            <!-- <td>{{ subject.docSerialNo }}</td> -->
            <td>{{$index + 1}}</td>
          </tr>
          <tr>
            <th translate="DESCRIPTION"></th>
            <td>{{ subject.docDesceng }}</td>
          </tr>
          <tr>
            <th translate="MANDATORY"></th>
            <td>{{ subject.docMandatory }}</td>
          </tr>
          <!-- <tr>
            <th translate="UPLOAD"></th>
            <td><input type="file" data-max-size="5000000" class="filecss " id="{{ subject.docID }}"
                       ng-model="COUdocupload" onchange="angular.element(this).scope().imageupload(this)"/>
              <div class="note-for-fileupload">{{'Onlypdfdocxls' | translate}}</div>
              <div class="note-for-fileupload">{{'validdocumentSize5' | translate}}</div>
            </td>
          </tr> -->
          <tr>
            <th translate="UPLOAD"></th>
            <td>
              <input name="foo" type="file" class="filecss " id="{{ subject.docID }}"
              ng-model="COUdocupload" accept="image/jpeg,image/gif,image/png,application/pdf,image/x-eps">
              <!-- <input type="file" data-max-size="5000000" class="filecss " id="{{ subject.docID }}"
                       ng-model="COUdocupload" accept="application/pdf,application/png,application/jpeg,application/jpg"
                        onchange="angular.element(this).scope().imageupload(this)"/> -->
              <div class="note-for-fileupload">{{'Onlypdfdocxls' | translate}}</div>
              <div class="note-for-fileupload">{{'validdocumentSize5' | translate}}</div>
            </td>
          </tr>
          <!-- <tr>
            <th>
              <input type="file" name="upload" accept="application/pdf,application/vnd.ms-excel" />

            </th>
          </tr> -->
        </table>
      </div>
      <div class="padding">
        <button ng-disabled="!rtiInformationForm.$valid"  class="button button-block  customBgColor" on-tap="saveRtiFormData()">
         <span translate="SUBMIT" style="color:#fff"></span></button>
      </div>
    </form>

  </ion-content>
  </ion-view>
