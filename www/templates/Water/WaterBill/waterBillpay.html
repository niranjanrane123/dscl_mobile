<ion-content ng-controller="waterBillPayCtrl" class="HomeBackground" >
  <!--<h3 class="heading"  translate="WATER_BILL_PAYMENT"></h3>-->
      <form name="waterBillPay">
        <div class="headingDiv">
          <h3 style="height:32px;padding: 5px 0px 0px 10px;" class="heading" translate="WATER_BILL_PAYMENT"><img src="./img/quick-services-32x32.png" width="32" height="32"></h3>
        </div>
         <div class="list">
          <label class="item item-input item-floating-label">
            <span class="input-label required" translate="CONNECTION_NUMBER"></span>
            <input type="text" placeholder="{{'CONNECTION_NUMBER' | translate}}*" name="search" ng-model="search" id="connectionNosearch"
                 required/>
            <span class="errorMessage" ng-show="waterBillPay.search.$error.pattern" translate="VALIDPROPERTY"></span>
         </label>

           <div class="padding">
            <button ng-disabled="!waterBillPay.$valid" ng-click="searchWaterBill()" id="btn1"
             class="button button-block  customBgColor"><i class="icon ion-search fonth3"></i>
            <span translate="SEARCH"></span></button>
           </div>
         </div>
      </form>
    </ion-content>
