<ion-modal-view>
     <ion-header-bar class="bar-dark">
        <h1 class="title logo-app">Professional Details</h1>
        <button class="button button-icon button-clear ion-ios-close-empty" ng-click="closeModal()"></button>
    </ion-header-bar>

 <ion-content ng-controller="professModalCtrl">

		<form name="additionalOwnerForm">
            <div class="list">
          	 <label class="input-label padding-left-15 required" translate="QUALIFICATION"></label>
				<select class="select-dropdown" name="qualification" ng-model="qualification"
				ng-options="o.value as o.name for o in ttlList" required>
					<option value="" translate="SELECT">Select</option>
					<!-- <option value="Mr">Mr</option>
					<option value="Mrs">Mrs</option> -->
				</select>
	           <label class="item item-input item-floating-label">
					<span class="input-label required " translate="INSTITUTENAME"></span>
					<input type="text" placeholder="{{'INSTITUTENAME' | translate}}*" name="instituteName" ng-model="instituteName"  required/>
					<span class="errorMessage" ng-show="additionalOwnerForm.instituteName.$error.pattern">Please Enter Valid Institute Name</span>
				</label>
				<label class="item item-input item-floating-label">
					<span class="input-label " translate="INSTITUTEADDRESS"> </span>
					<input type="text" placeholder="{{'INSTITUTEADDRESS' | translate}}*" name="instituteAddress" ng-model="instituteAddress" required/>
					<span class="errorMessage" ng-show="additionalOwnerForm.instituteAddress.$error.pattern">Please Enter Valid Institute Address </span>
				</label>
        <label class="item item-input item-floating-label">
          <span class="input-label" translate="DATEOFPASSING"></span>
          <input type="text" onfocus="(this.type='date')" placeholder="{{ 'DATEOFPASSING' | translate}}*" ng-blur="changeAttr($event)" name="doPassing" ng-model="doPassing" ng-trim="false"
                 ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" required/>
          <span class="errorMessage" ng-show="additionalOwnerForm.doPassing.$error.pattern">Please Enter Valid Date</span>
        </label>

				<label class="item item-input item-floating-label">
					<span class="input-label required" translate="PERCENT"></span>
					<input type="number" placeholder="{{'PERCENT' | translate}}*" name="percent" ng-model="percent"
					  required/>
					<span class="errorMessage" ng-show="additionalOwnerForm.percent.$error.pattern" translate="">Please Enter Valid Percent</span>
				</label>

            </div>
      <div class="button-group" data-grouptype="OR" style="font-size: 24px;">
				<button ng-disabled="additionalOwnerForm.$invalid" type="button" class="button  twoButtons customBgColor" ng-click="additionalOwner('save')" translate="SAVE">Save</button>
				<button ng-disabled="additionalOwnerForm.$invalid" type="button" class="button  twoButtons customBgColor" ng-click="additionalOwner('savenew')" translate="SAVECON">Save & Add</button>
			</div>
        </form>

 </ion-content>


</ion-modal-view>
