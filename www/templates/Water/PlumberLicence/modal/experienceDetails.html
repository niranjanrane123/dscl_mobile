<ion-modal-view>
     <ion-header-bar class="bar-dark">
        <h1 class="title logo-app" translate="EXPERIENCEDETAILS"></h1>
        <button class="button button-icon button-clear ion-ios-close-empty" ng-click="closeModal2()"></button>
    </ion-header-bar>

 <ion-content ng-controller="experienceModalCtrl">

		<form name="experienceForm">
       <div class="list">
        <label class="item item-input item-floating-label">
					<span class="input-label required " translate="EMPLOYERSNAME"></span>
					<input type="text" placeholder="{{'EMPLOYERSNAME' | translate}}*" name="empName" ng-model="empName"  required/>
					<span class="errorMessage" ng-show="experienceForm.empName.$error.pattern">Please Enter Valid Institute Name</span>
				</label>
				<label class="item item-input item-floating-label">
					<span class="input-label " translate="EMPLOYERSADDRESS"> </span>
					<input type="text" placeholder="{{'EMPLOYERSADDRESS' | translate}}" name="empAddress" ng-model="empAddress" required/>
					<span class="errorMessage" ng-show="experienceForm.empAddress.$error.pattern">Please Enter Valid Institute Address </span>
				</label>
        <label class="item item-input item-floating-label">
          <span class="input-label required" translate="FROMDATE"></span>
          <input type="text"   ng-blur="changeAttr2($event)"  onfocus="(this.type='date')" name="fromDate" ng-model="fromDate" ng-trim="false" placeholder="{{'FROMDATE' | translate}}"
                 ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" required/>
          <span class="errorMessage" ng-show="experienceForm.date.$error.pattern">Please Enter Valid Date</span>
        </label>

        <label class="item item-input item-floating-label">
          <span class="input-label required" translate="TODATE"></span>
          <input type="text" ng-change="calculateYear()"  ng-blur="changeAttr($event)"  onfocus="(this.type='date')" name="toDate" ng-model="toDate" ng-trim="false" placeholder="{{'TODATE' | translate}}"
                 ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" required/>
          <span class="errorMessage" ng-show="experienceForm.date.$error.pattern">Please Enter Valid Date</span>
        </label>

				<label class="item item-input item-floating-label">
					<span class="input-label required" translate="EXPERIENCE"></span>
					<input type="number" placeholder="{{'EXPERIENCE' | translate}}*" name="experience" ng-model="experience"
					 ng-trim="false" required disabled/>
					<span class="errorMessage" ng-show="experienceForm.percent.$error.pattern">Please Enter Valid Experience</span>
				</label>
        <label class="input-label padding-left-15 required" translate="FIRMTYPE"></label>
         <select class="select-dropdown" name="firmType" ng-model="firmType"
                 ng-options="o.value as o.name for o in firmList" required>
           <option value="" translate="SELECT">Select</option>
           <!-- <option value="Mr">Mr</option>
                     <option value="Mrs">Mrs</option> -->
         </select>
      </div>
      <div class="button-group" data-grouptype="OR" style="font-size: 24px;">
				<button ng-disabled="experienceForm.$invalid" type="button" class="button  twoButtons customBgColor" ng-click="additionalOwner('save')" translate="SAVE">Save</button>
				<button ng-disabled="experienceForm.$invalid" type="button" class="button  twoButtons customBgColor" ng-click="additionalOwner('savenew')" translate="SAVECON">Save & Add</button>
			</div>
        </form>

 </ion-content>


</ion-modal-view>
