<h3 class="heading" translate="DISCONNECTIONDETAILS"></h3>

<form name="DisconnNoForm">
	<div class="list">

    <label class="input-label padding-left-15 required" translate="TITLE"></label>
    <select class="select-dropdown" name="plbTitle" ng-model="plbTitle"

      <option value="" translate="SELECT">Select</option>
    </select>
    <label class="item item-input item-floating-label">
      <span class="input-label required" translate="FIRSTNAME"></span>
      <input type="text" placeholder="{{'FIRSTNAME' | translate}}*" name="plbFirstName" ng-model="plbFirstName"  required/>
      <span class="errorMessage" ng-show="DisconnNoForm.plbFirstName.$error.pattern" translate="PLEASEENTERVALIDNAME"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label" translate="MIDDLENAME"></span>
      <input type="text" placeholder="{{'MIDDLENAME' | translate}}" name="plbMiddleName" ng-model="plbMiddleName"/>
      <span class="errorMessage" ng-show="DisconnNoForm.plbMiddleName.$error.pattern" translate="PLEASEENTERVALIDMIDDLENAME"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label required" translate="LASTNAME"></span>
      <input type="text" placeholder="{{'LASTNAME' | translate}}*" name="plbLastName" ng-model="plbLastName"  required/>
      <span class="errorMessage" ng-show="DisconnNoForm.plbMiddleName.$error.pattern" translate="PLEASEENTERVALIDLASTNAME"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label required" translate="MOBILENO"></span>
      <input type="number" placeholder="{{'MOBILENO' | translate}}*" name="plbMobileNo" ng-model="plbMobileNo" ng-trim="false" ng-pattern="/^[0-9]{10,10}$/" required/>
      <span class="errorMessage" ng-show="DisconnNoForm.plbMobileNo.$error.pattern" translate="VALIDMOBILE"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label" translate="EMAILID"></span>
      <input type="text" placeholder="{{'EMAILID' | translate}}" name="plbEmail" ng-model="plbEmail" ng-trim="false" ng-pattern="/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/" />
      <span class="errorMessage" ng-show="DisconnNoForm.plbEmail.$error.pattern" translate="VALIDEMAIL"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label required" translate="ADDRESSLINE1"></span>
      <input type="text" placeholder="{{'ADDRESSLINE1' | translate}}*" name="plbAddress1" ng-model="plbAddress1"  required/>
      <span class="errorMessage" ng-show="DisconnNoForm.plbAddress1.$error.pattern" translate="VALIDADDRESS"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label" translate="ADDRESSLINE2"></span>
      <input type="text" placeholder="{{'ADDRESSLINE2' | translate}}" name="plbAddress2" ng-model="plbAddress2"  />
      <span class="errorMessage" ng-show="DisconnNoForm.plbAddress2.$error.pattern" translate="VALIDADDRESS"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label" translate="ADDRESSLINE3"></span>
      <input type="text" placeholder="{{'ADDRESSLINE3' | translate}}" name="plbAddress3" ng-model="plbAddress3"  />
      <span class="errorMessage" ng-show="DisconnNoForm.plbAddress3.$error.pattern" translate="VALIDADDRESS"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label required" translate="PINCODE"></span>
      <input type="number" placeholder="{{'PINCODE' | translate}}*" name="plbPinCode" ng-model="plbPinCode" ng-trim="false" ng-pattern="/^[1-9]\d{5,5}$/" required/>
      <span class="errorMessage" ng-show="DisconnNoForm.plbPinCode.$error.pattern" translate="VALIDPINCODE"></span>
    </label>
    <label class="item item-input item-floating-label">
      <span class="input-label" translate="ADHARNO"></span>
      <input type="number" placeholder="{{'ADHARNO' | translate}}" name="plbAdharNumber" ng-model="plbAdharNumber" ng-trim="false" ng-pattern="/^[0-9]{12,12}$/"/>
      <span class="errorMessage" ng-show="DisconnNoForm.plbAdharNumber.$error.pattern" translate="VALIDAADHAR"></span>
    </label>
    <label class="input-label padding-left-15 required" translate="ISBELOWPOVERTYLINE"></label>
    <select class="select-dropdown" name="plbPovertyLine" ng-model="plbPovertyLine"
            ng-options="obj.id as obj.value for obj in bplResponse2" ng-change="changePoverty()" required>
      <option value="" translate="SELECT">Select</option>
    </select>
    <div id="isbpl" ng-if="plbPovertyLinee == 'Y'">
      <label class="item item-input item-floating-label">
        <span class="input-label required" translate="BPLNO"></span>
        <input type="number" placeholder="{{'BPLNO' | translate}}*" name="plbBplno" ng-model="data_.plbBplno" id="bplNumber"
               ng-keyup="sixteenLimitBpl()" ng-pattern="/^[0-9]{6,6}$/" ng-trim="false"  required/>
        <span class="errorMessage" ng-show="DisconnNoForm.plbBplno.$error.pattern" translate="VALIDBPL"></span>
      </label>
    </div>

            </div>

            <div class="select">
                <select class="search_categories" name="propertyzfive" ng-model="wardFour"  id="complaintReferencefive"

    <label class="item item-input item-floating-label">
		<span class="input-label required" translate="CONNECTION_NUMBER"></span>
		<input type="text" placeholder="{{'CONNECTION_NUMBER' | translate}}*" name="connectionNosearch" ng-model="connectionNosearch" id="connectionNosearch"
	     ng-keyup="eighteendigit()"  required/>
		<span class="errorMessage" ng-show="DisconnNoForm.connectionNosearch.$error.pattern">Please Enter Valid Connection Number</span>
	 </label>

	 <div class="padding">
		<button ng-disabled="!DisconnNoForm.$valid" ng-click="disConnNosearch()"
		class="button button-block  customBgColor ">
		<i class="icon ion-search fonth3"></i>
		<span translate="SEARCH"></span></button>
 	</div>
  </div>
</form>

<form name="DiscoonectionForm" ng-if="disconnNoSearchDetails">
	<div class="list">
		<label class="item item-input"></label>
		<label class="item item-input item-floating-label">
			<span class="input-label " translate="CONSUMERNAME"></span>
			<input type="text" placeholder="Consumer Name" name="data.disConsumerName" ng-model="data.disConsumerName"
			 disabled/>
		</label>
		<label class="item item-input item-floating-label">
			<span class="input-label " translate="AREANAME"></span>
			<input type="text" placeholder="Area Name" name="data.disAreaName"
			 ng-model="data.disAreaName" disabled/>

		</label>
		<label class="input-label padding-left-15 required" translate="DisConn_Type"></label>
		<select class="select-dropdown" name="data.disConnType" id="DisConnType" ng-model="data.disConnType"
		ng-options="o.id as o.name for o in DICoptions" required>
			<option value="" translate="SELECT"></option>
			<!-- <option value="274">Permanent Disconnection</option>
			<option value="275">Temporary Disconnection</option> -->
		</select>
		<div ng-if="data.disConnType == '3889'">
			<label class="item item-input"></label>
			<h3 class="heading" translate="TEMPORARYDISCONNECTION"></h3>
			<label class="item item-input item-floating-label">
				<span class="input-label" translate="FROMDATE"></span>
				<input type="date" placeholder="From Date(DD/MM/YYYY)" ng-blur="changeAttr($event)"
				name="data.disfromdate" ng-model="data.disfromdate" ng-trim="false" ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" required/>
				<span class="errorMessage" ng-show="DiscoonectionForm.data.disfromdate.$error.pattern" translate="VALIDATE"></span>
			</label>
			<label class="item item-input item-floating-label">
				<span class="input-label" translate="TODATE"></span>
				<input type="date" placeholder="To Date(DD/MM/YYYY)" ng-blur="tochangeAttr($event)"
				 name="data.distodate" ng-model="data.distodate" ng-trim="false" ng-pattern="^(?:(?:31(\/|-|\.)(?:0?[13578]|1[02]))\1|(?:(?:29|30)(\/|-|\.)(?:0?[1,3-9]|1[0-2])\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:29(\/|-|\.)0?2\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:0?[1-9]|1\d|2[0-8])(\/|-|\.)(?:(?:0?[1-9])|(?:1[0-2]))\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$" required/>
				<span class="errorMessage" ng-show="DiscoonectionForm.data.distodate.$error.pattern" translate="VALIDATE"></span>
			</label>
		</div>
		<label class="item item-input item-floating-label"></label>
		<label class="item item-input item-floating-label">
			<span class="input-label required" translate="DISCONNECTIONREASON"></span>
			<input type="text" placeholder="Disconnection Reason*" name="data.disConnReason" ng-model="data.disConnReason" required/>
			<span class="errorMessage" ng-show="DiscoonectionForm.data.disConnReason.$error.pattern" translate="VALIDDISCONNECTION"></span>
		</label>
		<label class="input-label padding-left-15 required" translate="Plumber_Details"></label>
		<select class="select-dropdown" name="data.disPlumberDetail" ng-model="data.disPlumberDetail" required>
			<option value="" translate="SELECT"></option>
			<option value="UR" translate="ULBREGISTER"></option>
			<option value="NUR" translate="NOULBREGISTER"></option>
		</select>
    <div>
    <label class="input-label padding-left-15 required" translate="SELECTPLUMBER"></label>
    <select class="select-dropdown" name="WNCplumber" ng-model="WNCplumber" id="selplumber" ng-click="Plumber()" ng-change="selectplumber()"
            ng-options="o.pid as o.pname for o in plumber" required>
      <option value="" translate="SELECT"></option>
    </select><label class="item item-input item-floating-label"></label>
    </div>
		<div class="padding">
			<button ng-disabled="DiscoonectionForm.$invalid" ng-click="saveDisconnection()"
			class="button button-block  customBgColor">
			<span translate="CONFIRM"></span></button>
		</div>
	</div>
</form>

    </ion-content>
</ion-view>
